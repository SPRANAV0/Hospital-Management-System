{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block header %}❌ Error {{ code }}{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;text-align:center;padding:40px">
  <div style="font-size:56px;margin-bottom:12px">{{ '🔍' if code==404 else '⚠️' }}</div>
  <h2 style="margin-bottom:8px;color:var(--primary-dark)">{{ code }}</h2>
  <p class="text-muted" style="margin-bottom:20px">{{ message }}</p>
  <a class="btn btn-primary" href="{{ url_for('dashboard') }}">← Back to Dashboard</a>
</div>
{% endblock %}
